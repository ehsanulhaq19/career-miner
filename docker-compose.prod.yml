version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: careerminer-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: careerminer
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: careerminer-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: /career-miner
        NEXT_PUBLIC_API_URL: https://imehsan.com/career-miner/api
    container_name: careerminer-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BASE_PATH: /career-miner
      NEXT_PUBLIC_API_URL: https://imehsan.com/career-miner/api
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
